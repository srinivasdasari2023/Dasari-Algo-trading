name: Backend CI
on:
  push:
    branches: [main, develop]
    paths: ['backend/**', 'docker/Dockerfile.api']
  pull_request:
    branches: [main, develop]
    paths: ['backend/**', 'docker/Dockerfile.api']
jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check app tests
      - name: Unit tests
        run: pytest -v tests/
  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f docker/Dockerfile.api -t capitalguard-api:${{ github.sha }} .
